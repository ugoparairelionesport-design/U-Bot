name: Replit Sync

on:
  workflow_dispatch:

jobs:
  sync-to-replit:
    runs-on: ubuntu-latest
    env:
      REPLIT_CONFIG_DIR: /tmp/replit-cli
      REPLIT_KEY: ${{ secrets.REPLIT_KEY }}
      REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
      REPLIT_REPL_ID: ${{ secrets.REPLIT_REPL_ID }}
      REPLIT_REPL_SLUG: ${{ secrets.REPLIT_REPL_SLUG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate Replit secrets
        run: |
          REPLIT_AUTH_KEY="$REPLIT_KEY"
          REPLIT_TARGET="${REPLIT_REPL_ID:-$REPLIT_REPL_SLUG}"
          if [ -z "$REPLIT_AUTH_KEY" ] || [ -z "$REPLIT_TARGET" ]; then
            echo "ERROR: Define REPLIT_KEY and REPLIT_REPL_ID (preferred) or REPLIT_REPL_SLUG in GitHub Secrets."
            exit 1
          fi
          case "$REPLIT_AUTH_KEY" in
            *:*)
              ;;
            *)
              echo "ERROR: REPLIT_KEY must be a crosis API key in the form xxxxx:xxxxx"
              exit 1
              ;;
          esac
          if [ -n "$REPLIT_TOKEN" ] && [ "$REPLIT_TOKEN" = "$REPLIT_AUTH_KEY" ]; then
            echo "ERROR: REPLIT_TOKEN appears to contain the same value as REPLIT_KEY. This workflow needs a crosis REPLIT_KEY, not a standard token."
            exit 1
          fi

      - name: Prepare Replit CLI config
        run: |
          mkdir -p "$REPLIT_CONFIG_DIR"
          printf '%s' "{\"key\": \"$REPLIT_KEY\"}" > "$REPLIT_CONFIG_DIR/.replitcli.json"

      - name: Sync files to Replit
        run: |
          REPLIT_TARGET="${REPLIT_REPL_ID:-$REPLIT_REPL_SLUG}"
          set +e
          SYNC_OUTPUT=$(npx --yes replit cp --repl "$REPLIT_TARGET" . repl: -q 2>&1)
          SYNC_STATUS=$?
          printf '%s\n' "$SYNC_OUTPUT"

          if [ "$SYNC_STATUS" -ne 0 ]; then
            SUMMARY_OUTPUT=$(printf '%s' "$SYNC_OUTPUT" | tail -c 600 | tr '\n' ' ')
            echo "::error::Replit sync failed: $SUMMARY_OUTPUT"
            exit "$SYNC_STATUS"
          fi

      - name: Restart Replit app
        run: |
          REPLIT_TARGET="${REPLIT_REPL_ID:-$REPLIT_REPL_SLUG}"
          npx --yes replit run --restart "$REPLIT_TARGET"
