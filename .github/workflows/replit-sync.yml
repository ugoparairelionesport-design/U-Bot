name: Replit Sync

on:
  push:
    branches: [ master ]

jobs:
  sync-to-replit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify Replit secrets
        run: |
          if [ -z "${{ secrets.REPLIT_TOKEN }}" ] || [ -z "${{ secrets.REPLIT_REPL_SLUG }}" ]; then
            echo "ERROR: REPLIT_TOKEN and REPLIT_REPL_SLUG must be set in GitHub Secrets."
            exit 1
          fi

      - name: Get Replit Repl ID
        id: get-repl-id
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -X POST https://replit.com/graphql \
            -H "Authorization: Bearer ${{ secrets.REPLIT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Origin: https://replit.com" \
            -H "Referer: https://replit.com/" \
            -d '{
              "query": "query { currentUser { repls { id slug } } }"
            }')

          echo "DEBUG: Raw Replit response:"
          echo "$RESPONSE"

          REPL_ID=$(echo "$RESPONSE" | jq -r ".data.currentUser.repls[] | select(.slug == \"${{ secrets.REPLIT_REPL_SLUG }}\") | .id") || {
            echo "ERROR: Failed to parse JSON response from Replit."
            exit 1
          }

          if [ -z "$REPL_ID" ]; then
            echo "ERROR: Could not find repl with slug ${{ secrets.REPLIT_REPL_SLUG }}"
            exit 1
          fi

          echo "repl_id=$REPL_ID" >> $GITHUB_OUTPUT

      - name: Sync Replit from GitHub
        run: |
          RESPONSE=$(curl -sS -X POST https://replit.com/graphql \
            -H "Authorization: Bearer ${{ secrets.REPLIT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "X-Requested-With: XMLHttpRequest" \
            -H "Origin: https://replit.com" \
            -H "Referer: https://replit.com/" \
            -d "{\
              \"query\": \"mutation SyncRepl(\$input: SyncReplInput!) { syncRepl(input: \$input) { ... on SyncReplSuccess { repl { id } } } }\",\
              \"variables\": {\
                \"input\": {\
                  \"replId\": \"${{ steps.get-repl-id.outputs.repl_id }}\"\
                }\
              }\
            }"

          echo "DEBUG: Raw Sync response:"
          echo "$RESPONSE"

          if echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "Sync response is valid JSON"
          else
            echo "ERROR: Sync response is not valid JSON"
            exit 1
          fi
